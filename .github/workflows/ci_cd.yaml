name: CI/CD - Servidor de Livros

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integracao-continua:
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Baixando o código do repositório
        uses: actions/checkout@v7

      - name: 🐍 Configurando o ambiente Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14' 

      - name: 🎨 Verificando a formatação
        run: |
          pip install ruff
          ruff format --check

      - name: 🔎 Executando o linter
        run: |
          ruff check 

      - name: 📦 Instalando as dependências do projeto
        run: |
          pip install -r requirements.txt
          pip install -e . 

      - name: 🧪 Executando os testes unitários com Pytest
        run: pytest

  entrega-continua:
    needs: integracao-continua
    runs-on: ubuntu-latest
    steps:
      - name: Login docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v4

      - name: Configurar buildx
        uses: docker/setup-buildx-action@v4

      - name: Build e push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/vinicius-godoy-de-mendonca:27-06-26
